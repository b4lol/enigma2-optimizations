# Enigma2 / Broadcom STB Performance Optimization Config
# Network/Security Spoof protection
net.ipv4.conf.default.rp_filter=1
net.ipv4.conf.all.rp_filter=1

# TCP/IP parameters for high-performance network / streaming
net.ipv4.tcp_timestamps = 1
net.ipv4.tcp_window_scaling = 1
net.ipv4.tcp_sack = 1
net.ipv4.tcp_dsack = 1
net.ipv4.tcp_slow_start_after_idle = 0

# Increase network buffer sizes for media streaming / high-speed transfers
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216
net.core.netdev_max_backlog = 5000

# Virtual memory optimization (Flash/eMMC wear reduction & responsiveness)
vm.swappiness = 10
vm.vfs_cache_pressure = 50
vm.dirty_background_ratio = 5
vm.dirty_ratio = 15
vm.dirty_writeback_centisecs = 1500
vm.dirty_expire_centisecs = 3000
vm.min_free_kbytes = 8192

# File system settings
fs.file-max = 2097152
